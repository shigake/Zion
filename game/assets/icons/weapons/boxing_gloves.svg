<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Left glove -->
  <ellipse cx="20" cy="28" rx="12" ry="14" fill="#E53935" stroke="#C62828" stroke-width="1"/>
  <!-- Left glove thumb -->
  <ellipse cx="12" cy="22" rx="4" ry="6" transform="rotate(-20 12 22)" fill="#E53935" stroke="#C62828" stroke-width="0.8"/>
  <!-- Left glove highlight -->
  <ellipse cx="18" cy="24" rx="5" ry="6" fill="#EF5350" opacity="0.4"/>
  <!-- Left glove lacing -->
  <line x1="16" y1="18" x2="24" y2="18" stroke="#FFCDD2" stroke-width="0.8"/>
  <line x1="17" y1="21" x2="23" y2="21" stroke="#FFCDD2" stroke-width="0.6"/>
  <!-- Left wrist -->
  <rect x="16" y="40" width="8" height="8" rx="2" fill="#C62828" stroke="#B71C1C" stroke-width="0.5"/>
  <line x1="17" y1="44" x2="23" y2="44" stroke="#E53935" stroke-width="0.5"/>
  <!-- Right glove -->
  <ellipse cx="44" cy="28" rx="12" ry="14" fill="#E53935" stroke="#C62828" stroke-width="1"/>
  <!-- Right glove thumb -->
  <ellipse cx="52" cy="22" rx="4" ry="6" transform="rotate(20 52 22)" fill="#E53935" stroke="#C62828" stroke-width="0.8"/>
  <!-- Right glove highlight -->
  <ellipse cx="42" cy="24" rx="5" ry="6" fill="#EF5350" opacity="0.4"/>
  <!-- Right glove lacing -->
  <line x1="40" y1="18" x2="48" y2="18" stroke="#FFCDD2" stroke-width="0.8"/>
  <line x1="41" y1="21" x2="47" y2="21" stroke="#FFCDD2" stroke-width="0.6"/>
  <!-- Right wrist -->
  <rect x="40" y="40" width="8" height="8" rx="2" fill="#C62828" stroke="#B71C1C" stroke-width="0.5"/>
  <line x1="41" y1="44" x2="47" y2="44" stroke="#E53935" stroke-width="0.5"/>
  <!-- Impact lines -->
  <line x1="4" y1="14" x2="8" y2="18" stroke="#90A4AE" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="56" y1="14" x2="60" y2="10" stroke="#90A4AE" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="32" y1="8" x2="32" y2="4" stroke="#90A4AE" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Strings connecting -->
  <path d="M20 48 Q32 56, 44 48" fill="none" stroke="#8D6E63" stroke-width="1"/>
</svg>