<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bottle body -->
  <path d="M20 28 Q18 30, 18 36 L18 50 Q18 54, 22 54 L42 54 Q46 54, 46 50 L46 36 Q46 30, 44 28Z" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.8" opacity="0.85"/>
  <!-- Liquid inside -->
  <path d="M20 34 L44 34 L44 50 Q44 52, 42 52 L22 52 Q20 52, 20 50Z" fill="#4CAF50" opacity="0.7"/>
  <!-- Bottle neck -->
  <rect x="28" y="16" width="8" height="12" rx="1" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <!-- Cork -->
  <rect x="27" y="10" width="10" height="7" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Bottle highlight -->
  <path d="M22 30 L24 30 L24 50 Q24 52, 22 50Z" fill="#A5D6A7" opacity="0.3"/>
  <!-- Skull label -->
  <circle cx="32" cy="42" r="4" fill="#E8F5E9" opacity="0.5"/>
  <circle cx="30.5" cy="41" r="1" fill="#1B5E20"/>
  <circle cx="33.5" cy="41" r="1" fill="#1B5E20"/>
  <line x1="30" y1="44" x2="34" y2="44" stroke="#1B5E20" stroke-width="0.5"/>
  <!-- Bubbles -->
  <circle cx="26" cy="46" r="1.5" fill="#81C784" opacity="0.6"/>
  <circle cx="36" cy="40" r="2" fill="#81C784" opacity="0.5"/>
  <circle cx="30" cy="36" r="1" fill="#81C784" opacity="0.7"/>
  <circle cx="38" cy="48" r="1.2" fill="#81C784" opacity="0.5"/>
  <!-- Rising bubbles above -->
  <circle cx="30" cy="6" r="1.5" fill="#4CAF50" opacity="0.3"/>
  <circle cx="35" cy="4" r="1" fill="#4CAF50" opacity="0.25"/>
  <circle cx="28" cy="2" r="0.8" fill="#4CAF50" opacity="0.2"/>
  <!-- Poison drip -->
  <path d="M38 54 Q38 58, 36 58 Q34 58, 34 56" fill="#4CAF50" opacity="0.6"/>
  <!-- Green glow -->
  <circle cx="32" cy="42" r="18" fill="#4CAF50" opacity="0.08"/>
</svg>