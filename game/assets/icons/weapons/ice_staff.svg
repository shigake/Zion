<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Staff shaft - icy -->
  <rect x="29" y="20" width="5" height="38" rx="2" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8" opacity="0.8"/>
  <!-- Frost on shaft -->
  <path d="M29 30 L26 28 L29 32" fill="#B3E5FC" opacity="0.5"/>
  <path d="M34 40 L37 38 L34 42" fill="#B3E5FC" opacity="0.5"/>
  <!-- Ice crystal top -->
  <polygon points="31.5,2 24,16 31.5,20 39,16" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
  <!-- Crystal facets -->
  <polygon points="31.5,2 28,14 31.5,18" fill="#B3E5FC" opacity="0.4"/>
  <polygon points="31.5,2 35,14 31.5,18" fill="#E1F5FE" opacity="0.3"/>
  <!-- Crystal glow -->
  <circle cx="31.5" cy="12" r="12" fill="#4FC3F7" opacity="0.12"/>
  <!-- Snowflake 1 -->
  <g transform="translate(16,10)" opacity="0.6">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#B3E5FC" stroke-width="0.8"/>
    <line x1="-3.5" y1="-2" x2="3.5" y2="2" stroke="#B3E5FC" stroke-width="0.8"/>
    <line x1="-3.5" y1="2" x2="3.5" y2="-2" stroke="#B3E5FC" stroke-width="0.8"/>
  </g>
  <!-- Snowflake 2 -->
  <g transform="translate(48,14)" opacity="0.5">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#B3E5FC" stroke-width="0.7"/>
    <line x1="-2.5" y1="-1.5" x2="2.5" y2="1.5" stroke="#B3E5FC" stroke-width="0.7"/>
    <line x1="-2.5" y1="1.5" x2="2.5" y2="-1.5" stroke="#B3E5FC" stroke-width="0.7"/>
  </g>
  <!-- Snowflake 3 -->
  <g transform="translate(12,24)" opacity="0.4">
    <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#E1F5FE" stroke-width="0.6"/>
    <line x1="-2" y1="-1.2" x2="2" y2="1.2" stroke="#E1F5FE" stroke-width="0.6"/>
    <line x1="-2" y1="1.2" x2="2" y2="-1.2" stroke="#E1F5FE" stroke-width="0.6"/>
  </g>
  <!-- Ice particles -->
  <rect x="42" y="8" width="2" height="2" transform="rotate(45 43 9)" fill="#B3E5FC" opacity="0.5"/>
  <rect x="20" y="18" width="1.5" height="1.5" transform="rotate(45 20.75 18.75)" fill="#E1F5FE" opacity="0.4"/>
  <!-- Bottom frost -->
  <ellipse cx="31.5" cy="58" rx="5" ry="2" fill="#B3E5FC" opacity="0.4"/>
</svg>