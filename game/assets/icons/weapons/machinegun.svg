<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Barrel -->
  <rect x="34" y="24" width="24" height="5" rx="1" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
  <!-- Barrel holes -->
  <circle cx="54" cy="26.5" r="1.5" fill="#263238"/>
  <!-- Barrel vent holes -->
  <rect x="42" y="24.5" width="1.5" height="4" rx="0.5" fill="#37474F"/>
  <rect x="46" y="24.5" width="1.5" height="4" rx="0.5" fill="#37474F"/>
  <rect x="50" y="24.5" width="1.5" height="4" rx="0.5" fill="#37474F"/>
  <!-- Body -->
  <rect x="12" y="22" width="24" height="10" rx="2" fill="#546E7A" stroke="#37474F" stroke-width="0.5"/>
  <!-- Magazine -->
  <rect x="22" y="32" width="8" height="14" rx="1" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
  <!-- Magazine curve -->
  <path d="M22 42 Q21 46, 22 46 L30 46 Q31 46, 30 42" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
  <!-- Handle -->
  <path d="M14 32 L18 32 L16 44 L12 44Z" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <!-- Stock -->
  <path d="M12 22 L4 20 L4 24 L6 32 L12 32Z" fill="#546E7A" stroke="#37474F" stroke-width="0.5"/>
  <!-- Electric sparks -->
  <line x1="56" y1="22" x2="60" y2="18" stroke="#FFD600" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="26" x2="62" y2="24" stroke="#FFD600" stroke-width="1" stroke-linecap="round"/>
  <line x1="56" y1="30" x2="60" y2="34" stroke="#FFD600" stroke-width="1" stroke-linecap="round"/>
  <!-- Glow -->
  <circle cx="58" cy="26" r="6" fill="#FFD600" opacity="0.15"/>
</svg>