<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Purple aura outer -->
  <circle cx="32" cy="28" r="22" fill="#9C27B0" opacity="0.1"/>
  <circle cx="32" cy="28" r="16" fill="#9C27B0" opacity="0.15"/>
  <!-- Skull -->
  <ellipse cx="32" cy="26" rx="13" ry="14" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.8"/>
  <!-- Skull top detail -->
  <path d="M19 24 Q20 14, 32 12 Q44 14, 45 24" fill="#F5F5F5" stroke="#B0BEC5" stroke-width="0.5"/>
  <!-- Left eye socket -->
  <ellipse cx="26" cy="24" rx="4" ry="4.5" fill="#1A1A2E"/>
  <!-- Right eye socket -->
  <ellipse cx="38" cy="24" rx="4" ry="4.5" fill="#1A1A2E"/>
  <!-- Purple eye glow left -->
  <circle cx="26" cy="24" r="2" fill="#9C27B0" opacity="0.8"/>
  <circle cx="26" cy="23.5" r="1" fill="#CE93D8"/>
  <!-- Purple eye glow right -->
  <circle cx="38" cy="24" r="2" fill="#9C27B0" opacity="0.8"/>
  <circle cx="38" cy="23.5" r="1" fill="#CE93D8"/>
  <!-- Nose -->
  <path d="M30 30 L32 28 L34 30Z" fill="#B0BEC5"/>
  <!-- Teeth -->
  <rect x="25" y="34" width="3" height="4" rx="0.5" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.3"/>
  <rect x="28.5" y="34" width="3" height="5" rx="0.5" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.3"/>
  <rect x="32" y="34" width="3" height="5" rx="0.5" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.3"/>
  <rect x="35.5" y="34" width="3" height="4" rx="0.5" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.3"/>
  <!-- Jaw line -->
  <path d="M22 34 Q24 40, 32 40 Q40 40, 42 34" fill="none" stroke="#B0BEC5" stroke-width="0.8"/>
  <!-- Floating particles -->
  <circle cx="14" cy="18" r="1.5" fill="#9C27B0" opacity="0.5"/>
  <circle cx="50" cy="20" r="1" fill="#9C27B0" opacity="0.4"/>
  <circle cx="18" cy="42" r="1" fill="#9C27B0" opacity="0.3"/>
  <circle cx="48" cy="38" r="1.5" fill="#9C27B0" opacity="0.4"/>
  <circle cx="10" cy="32" r="0.8" fill="#CE93D8" opacity="0.5"/>
  <circle cx="54" cy="30" r="0.8" fill="#CE93D8" opacity="0.5"/>
</svg>