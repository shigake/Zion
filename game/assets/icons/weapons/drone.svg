<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Arms -->
  <line x1="16" y1="22" x2="32" y2="32" stroke="#546E7A" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="22" x2="32" y2="32" stroke="#546E7A" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="42" x2="32" y2="32" stroke="#546E7A" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="42" x2="32" y2="32" stroke="#546E7A" stroke-width="3" stroke-linecap="round"/>
  <!-- Propellers -->
  <ellipse cx="16" cy="20" rx="10" ry="2.5" fill="#78909C" opacity="0.6"/>
  <ellipse cx="48" cy="20" rx="10" ry="2.5" fill="#78909C" opacity="0.6"/>
  <ellipse cx="16" cy="40" rx="10" ry="2.5" fill="#78909C" opacity="0.6"/>
  <ellipse cx="48" cy="40" rx="10" ry="2.5" fill="#78909C" opacity="0.6"/>
  <!-- Propeller centers -->
  <circle cx="16" cy="20" r="2.5" fill="#455A64"/>
  <circle cx="48" cy="20" r="2.5" fill="#455A64"/>
  <circle cx="16" cy="40" r="2.5" fill="#455A64"/>
  <circle cx="48" cy="40" r="2.5" fill="#455A64"/>
  <!-- Body -->
  <ellipse cx="32" cy="32" rx="8" ry="6" fill="#37474F" stroke="#263238" stroke-width="0.8"/>
  <!-- Camera/sensor -->
  <circle cx="32" cy="34" r="3" fill="#263238" stroke="#455A64" stroke-width="0.5"/>
  <circle cx="32" cy="34" r="1.5" fill="#FFD600"/>
  <!-- Electric indicators -->
  <circle cx="26" cy="30" r="1" fill="#FFD600" opacity="0.8"/>
  <circle cx="38" cy="30" r="1" fill="#FFD600" opacity="0.8"/>
  <!-- Electric glow -->
  <circle cx="32" cy="34" r="5" fill="#FFD600" opacity="0.15"/>
  <!-- Landing gear -->
  <line x1="24" y1="38" x2="22" y2="50" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="40" y1="38" x2="42" y2="50" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="20" y1="50" x2="24" y2="50" stroke="#546E7A" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="50" x2="44" y2="50" stroke="#546E7A" stroke-width="2" stroke-linecap="round"/>
</svg>