<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Left stick -->
  <rect x="10" y="14" width="7" height="28" rx="2.5" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <!-- Left stick bands -->
  <rect x="10" y="18" width="7" height="2" rx="0.5" fill="#4E342E"/>
  <rect x="10" y="36" width="7" height="2" rx="0.5" fill="#4E342E"/>
  <!-- Right stick -->
  <rect x="46" y="22" width="7" height="28" rx="2.5" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <!-- Right stick bands -->
  <rect x="46" y="26" width="7" height="2" rx="0.5" fill="#4E342E"/>
  <rect x="46" y="44" width="7" height="2" rx="0.5" fill="#4E342E"/>
  <!-- Chain links -->
  <circle cx="20" cy="14" r="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="25" cy="12" r="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="30" cy="12" r="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="35" cy="13" r="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="40" cy="16" r="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="44" cy="20" r="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <!-- Chain highlight -->
  <path d="M19 14 Q30 8, 45 20" fill="none" stroke="#B0BEC5" stroke-width="0.5" opacity="0.4"/>
  <!-- Motion lines -->
  <path d="M8 10 Q6 8, 8 6" fill="none" stroke="#90A4AE" stroke-width="0.8" opacity="0.4"/>
  <path d="M55 52 Q58 54, 56 56" fill="none" stroke="#90A4AE" stroke-width="0.8" opacity="0.4"/>
  <!-- End caps -->
  <ellipse cx="13.5" cy="14" rx="3.5" ry="1.5" fill="#4E342E"/>
  <ellipse cx="49.5" cy="50" rx="3.5" ry="1.5" fill="#4E342E"/>
</svg>