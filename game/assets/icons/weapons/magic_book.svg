<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Book back cover -->
  <rect x="10" y="14" width="44" height="40" rx="2" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <!-- Left page -->
  <path d="M12 16 L32 20 L32 52 L12 48Z" fill="#FFF8E1"/>
  <!-- Right page -->
  <path d="M52 16 L32 20 L32 52 L52 48Z" fill="#FFFDE7"/>
  <!-- Spine -->
  <line x1="32" y1="20" x2="32" y2="52" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Page lines left -->
  <line x1="16" y1="24" x2="29" y2="26" stroke="#D7CCC8" stroke-width="0.5"/>
  <line x1="16" y1="28" x2="29" y2="30" stroke="#D7CCC8" stroke-width="0.5"/>
  <line x1="16" y1="32" x2="29" y2="34" stroke="#D7CCC8" stroke-width="0.5"/>
  <!-- Rune symbols on left page -->
  <path d="M20 38 L22 34 L24 38 L20 36 L24 36Z" fill="#90A4AE" opacity="0.7"/>
  <!-- Rune symbols on right page -->
  <circle cx="42" cy="30" r="4" fill="none" stroke="#90A4AE" stroke-width="0.8" opacity="0.7"/>
  <path d="M40 28 L44 32 M40 32 L44 28" stroke="#90A4AE" stroke-width="0.6" opacity="0.7"/>
  <!-- Glowing rune on right -->
  <path d="M38 38 L42 36 L46 38 L42 42Z" fill="#B0BEC5" opacity="0.6"/>
  <!-- Book cover edges -->
  <line x1="10" y1="14" x2="10" y2="54" stroke="#4E342E" stroke-width="1.5"/>
  <line x1="54" y1="14" x2="54" y2="54" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Cover decorations -->
  <path d="M12 14 L12 10 Q32 6, 52 10 L52 14" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <!-- Glowing particles above -->
  <circle cx="24" cy="8" r="1.5" fill="#90A4AE" opacity="0.5"/>
  <circle cx="40" cy="6" r="1" fill="#B0BEC5" opacity="0.4"/>
  <circle cx="32" cy="4" r="1.2" fill="#90A4AE" opacity="0.5"/>
  <circle cx="20" cy="12" r="0.8" fill="#CFD8DC" opacity="0.4"/>
  <circle cx="44" cy="10" r="0.8" fill="#CFD8DC" opacity="0.4"/>
</svg>