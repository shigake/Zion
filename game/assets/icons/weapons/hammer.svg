<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Handle -->
  <rect x="29" y="28" width="5" height="30" rx="2" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <!-- Handle wrap -->
  <line x1="30" y1="40" x2="33" y2="40" stroke="#6D4C41" stroke-width="0.6"/>
  <line x1="30" y1="44" x2="33" y2="44" stroke="#6D4C41" stroke-width="0.6"/>
  <line x1="30" y1="48" x2="33" y2="48" stroke="#6D4C41" stroke-width="0.6"/>
  <!-- Hammer head -->
  <rect x="12" y="10" width="40" height="20" rx="3" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Hammer face left -->
  <rect x="12" y="10" width="10" height="20" rx="2" fill="#90A4AE" stroke="#546E7A" stroke-width="0.5"/>
  <!-- Hammer face right -->
  <rect x="42" y="10" width="10" height="20" rx="2" fill="#90A4AE" stroke="#546E7A" stroke-width="0.5"/>
  <!-- Metal band -->
  <rect x="28" y="8" width="8" height="24" rx="1" fill="#546E7A" stroke="#37474F" stroke-width="0.5"/>
  <!-- Highlights -->
  <rect x="14" y="12" width="2" height="16" rx="1" fill="#CFD8DC" opacity="0.4"/>
  <rect x="44" y="12" width="2" height="16" rx="1" fill="#CFD8DC" opacity="0.4"/>
  <!-- Impact lines -->
  <line x1="8" y1="8" x2="4" y2="4" stroke="#B0BEC5" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="56" y1="8" x2="60" y2="4" stroke="#B0BEC5" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Pommel -->
  <ellipse cx="31.5" cy="58" rx="3.5" ry="1.5" fill="#4E342E"/>
</svg>