<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Left pistol -->
  <g transform="rotate(-30 20 32)">
    <!-- Barrel -->
    <rect x="6" y="24" width="18" height="6" rx="1" fill="#546E7A" stroke="#37474F" stroke-width="0.5"/>
    <!-- Body -->
    <rect x="14" y="22" width="14" height="10" rx="1.5" fill="#607D8B" stroke="#37474F" stroke-width="0.5"/>
    <!-- Handle -->
    <path d="M20 32 L24 32 L22 44 L18 44Z" fill="#5D4037" stroke="#3E2723" stroke-width="0.4"/>
    <!-- Trigger -->
    <path d="M20 34 Q19 36, 20 38" fill="none" stroke="#37474F" stroke-width="0.8"/>
    <!-- Barrel opening -->
    <circle cx="7" cy="27" r="2" fill="#263238"/>
    <!-- Muzzle flash -->
    <line x1="4" y1="24" x2="2" y2="22" stroke="#90A4AE" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="30" x2="2" y2="32" stroke="#90A4AE" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Right pistol -->
  <g transform="rotate(30 44 32)">
    <!-- Barrel -->
    <rect x="40" y="24" width="18" height="6" rx="1" fill="#546E7A" stroke="#37474F" stroke-width="0.5"/>
    <!-- Body -->
    <rect x="36" y="22" width="14" height="10" rx="1.5" fill="#607D8B" stroke="#37474F" stroke-width="0.5"/>
    <!-- Handle -->
    <path d="M40 32 L44 32 L42 44 L38 44Z" fill="#5D4037" stroke="#3E2723" stroke-width="0.4"/>
    <!-- Trigger -->
    <path d="M42 34 Q41 36, 42 38" fill="none" stroke="#37474F" stroke-width="0.8"/>
    <!-- Barrel opening -->
    <circle cx="57" cy="27" r="2" fill="#263238"/>
    <!-- Muzzle flash -->
    <line x1="60" y1="24" x2="62" y2="22" stroke="#90A4AE" stroke-width="0.8" opacity="0.5"/>
    <line x1="60" y1="30" x2="62" y2="32" stroke="#90A4AE" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>