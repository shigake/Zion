<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="28" fill="#9C27B0" opacity="0.08"/>
  <!-- Portal outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#9C27B0" stroke-width="3"/>
  <!-- Portal middle ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Portal inner ring -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#CE93D8" stroke-width="1.5" opacity="0.6"/>
  <!-- Dark center -->
  <circle cx="32" cy="32" r="12" fill="#1A1A2E"/>
  <!-- Swirl effect -->
  <path d="M32 20 Q40 22, 42 32 Q40 42, 32 44 Q24 42, 22 32 Q24 22, 32 20" fill="none" stroke="#9C27B0" stroke-width="1.5" opacity="0.5"/>
  <path d="M32 24 Q38 26, 38 32 Q38 38, 32 40 Q26 38, 26 32 Q26 26, 32 24" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.4"/>
  <!-- Inner swirl -->
  <path d="M32 28 Q36 28, 36 32 Q36 36, 32 36 Q28 36, 28 32 Q28 28, 32 28" fill="#9C27B0" opacity="0.3"/>
  <!-- Center void -->
  <circle cx="32" cy="32" r="4" fill="#0D0D1A"/>
  <!-- Energy wisps -->
  <path d="M10 32 Q8 28, 12 26" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M54 32 Q56 28, 52 26" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M32 10 Q28 8, 26 12" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M32 54 Q36 56, 38 52" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Floating particles -->
  <circle cx="16" cy="18" r="1" fill="#CE93D8" opacity="0.6"/>
  <circle cx="48" cy="18" r="1.2" fill="#9C27B0" opacity="0.5"/>
  <circle cx="14" cy="46" r="0.8" fill="#CE93D8" opacity="0.4"/>
  <circle cx="50" cy="46" r="1" fill="#9C27B0" opacity="0.5"/>
  <!-- Portal rune marks on outer ring -->
  <rect x="30" y="8" width="4" height="3" rx="1" fill="#CE93D8" opacity="0.5"/>
  <rect x="30" y="53" width="4" height="3" rx="1" fill="#CE93D8" opacity="0.5"/>
  <rect x="8" y="30" width="3" height="4" rx="1" fill="#CE93D8" opacity="0.5"/>
  <rect x="53" y="30" width="3" height="4" rx="1" fill="#CE93D8" opacity="0.5"/>
</svg>