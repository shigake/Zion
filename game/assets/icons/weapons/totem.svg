<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Base -->
  <rect x="20" y="52" width="24" height="6" rx="2" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <!-- Totem body -->
  <rect x="22" y="22" width="20" height="30" rx="3" fill="#795548" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Face - top section -->
  <rect x="24" y="24" width="16" height="12" rx="1" fill="#6D4C41"/>
  <!-- Eyes -->
  <path d="M27 28 L30 26 L33 28 L30 30Z" fill="#FFD600"/>
  <path d="M34 28 L37 26 L40 28 L37 30Z" fill="#FFD600"/>
  <!-- Mouth -->
  <rect x="28" y="32" width="8" height="3" rx="1" fill="#3E2723"/>
  <line x1="30" y1="32" x2="30" y2="35" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="32" y1="32" x2="32" y2="35" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="34" y1="32" x2="34" y2="35" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Lower face -->
  <rect x="24" y="38" width="16" height="8" rx="1" fill="#6D4C41"/>
  <circle cx="29" cy="42" r="2" fill="#3E2723"/>
  <circle cx="35" cy="42" r="2" fill="#3E2723"/>
  <!-- Wing/ear decorations -->
  <path d="M22 26 L16 22 L18 30Z" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
  <path d="M42 26 L48 22 L46 30Z" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Lightning bolt from top -->
  <path d="M32 2 L28 12 L33 12 L29 22 L36 10 L31 10Z" fill="#FFD600" stroke="#F9A825" stroke-width="0.5"/>
  <!-- Lightning glow -->
  <circle cx="32" cy="12" r="8" fill="#FFD600" opacity="0.15"/>
  <!-- Small sparks -->
  <line x1="18" y1="18" x2="14" y2="14" stroke="#FFD600" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="46" y1="18" x2="50" y2="14" stroke="#FFD600" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>