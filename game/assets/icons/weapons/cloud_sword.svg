<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Massive blade -->
  <path d="M24 4 L40 4 L42 6 L42 38 L40 40 L24 40 L22 38 L22 6Z" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Blade tip -->
  <polygon points="24,4 32,0 40,4" fill="#90A4AE" stroke="#546E7A" stroke-width="0.5"/>
  <!-- Blade center groove -->
  <rect x="30" y="4" width="4" height="36" fill="#546E7A" opacity="0.4"/>
  <!-- Blade edge highlights -->
  <rect x="22" y="6" width="2" height="32" fill="#B0BEC5" opacity="0.4"/>
  <rect x="40" y="6" width="2" height="32" fill="#B0BEC5" opacity="0.3"/>
  <!-- Blade holes (buster sword style) -->
  <circle cx="32" cy="12" r="3" fill="#546E7A" stroke="#455A64" stroke-width="0.5"/>
  <circle cx="32" cy="22" r="3" fill="#546E7A" stroke="#455A64" stroke-width="0.5"/>
  <!-- Guard -->
  <rect x="18" y="40" width="28" height="4" rx="1.5" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <!-- Guard wings -->
  <path d="M18 40 L14 42 L18 44" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <path d="M46 40 L50 42 L46 44" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <!-- Handle -->
  <rect x="28" y="44" width="8" height="14" rx="2" fill="#4E342E" stroke="#3E2723" stroke-width="0.5"/>
  <!-- Handle wrapping -->
  <line x1="29" y1="48" x2="35" y2="48" stroke="#6D4C41" stroke-width="0.5"/>
  <line x1="29" y1="52" x2="35" y2="52" stroke="#6D4C41" stroke-width="0.5"/>
  <!-- Pommel -->
  <circle cx="32" cy="60" r="3" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <circle cx="32" cy="60" r="1.2" fill="#78909C"/>
</svg>