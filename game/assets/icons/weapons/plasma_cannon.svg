<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Main body -->
  <rect x="10" y="24" width="30" height="14" rx="4" fill="#37474F" stroke="#263238" stroke-width="0.8"/>
  <!-- Barrel - wide futuristic -->
  <rect x="36" y="22" width="14" height="18" rx="3" fill="#455A64" stroke="#263238" stroke-width="0.5"/>
  <!-- Barrel opening -->
  <ellipse cx="50" cy="31" rx="6" ry="8" fill="#37474F" stroke="#263238" stroke-width="0.5"/>
  <ellipse cx="50" cy="31" rx="4" ry="6" fill="#263238"/>
  <!-- Energy coils on barrel -->
  <ellipse cx="40" cy="31" rx="1" ry="8" fill="none" stroke="#FFD600" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="44" cy="31" rx="1" ry="8" fill="none" stroke="#FFD600" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="48" cy="31" rx="1" ry="8" fill="none" stroke="#FFD600" stroke-width="0.8" opacity="0.6"/>
  <!-- Handle -->
  <path d="M18 38 L24 38 L22 50 L16 50Z" fill="#37474F" stroke="#263238" stroke-width="0.5"/>
  <!-- Power cell -->
  <rect x="12" y="26" width="8" height="10" rx="1" fill="#FFD600" opacity="0.3" stroke="#FFD600" stroke-width="0.5"/>
  <!-- Power indicator -->
  <rect x="14" y="28" width="4" height="6" rx="0.5" fill="#FFD600" opacity="0.6"/>
  <!-- Plasma energy at barrel -->
  <circle cx="52" cy="31" r="5" fill="#FFD600" opacity="0.4"/>
  <circle cx="52" cy="31" r="3" fill="#FFF176" opacity="0.6"/>
  <circle cx="52" cy="31" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <!-- Energy glow -->
  <circle cx="52" cy="31" r="10" fill="#FFD600" opacity="0.12"/>
  <!-- Electric arcs -->
  <path d="M54 24 Q58 22, 56 18" fill="none" stroke="#FFD600" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M54 38 Q58 40, 56 44" fill="none" stroke="#FFD600" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Top sight/rail -->
  <rect x="16" y="22" width="20" height="2" rx="0.5" fill="#455A64"/>
  <!-- Stock -->
  <path d="M10 24 L4 22 L4 28 Q4 38, 10 38" fill="#37474F" stroke="#263238" stroke-width="0.5"/>
</svg>