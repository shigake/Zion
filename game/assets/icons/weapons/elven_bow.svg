<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bow limb upper -->
  <path d="M32 32 Q28 24, 26 16 Q24 8, 28 4" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <!-- Bow limb lower -->
  <path d="M32 32 Q28 40, 26 48 Q24 56, 28 60" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <!-- Elegant curves (elven style) upper -->
  <path d="M28 4 Q32 2, 34 6" fill="none" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <!-- Elegant curves lower -->
  <path d="M28 60 Q32 62, 34 58" fill="none" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <!-- Vine/leaf decoration upper -->
  <path d="M27 12 Q22 10, 24 14" fill="none" stroke="#A1887F" stroke-width="1" opacity="0.7"/>
  <ellipse cx="22" cy="11" rx="2" ry="1" transform="rotate(-20 22 11)" fill="#90A4AE" opacity="0.4"/>
  <!-- Vine/leaf decoration lower -->
  <path d="M27 52 Q22 54, 24 50" fill="none" stroke="#A1887F" stroke-width="1" opacity="0.7"/>
  <ellipse cx="22" cy="53" rx="2" ry="1" transform="rotate(20 22 53)" fill="#90A4AE" opacity="0.4"/>
  <!-- Bowstring -->
  <line x1="34" y1="6" x2="34" y2="58" stroke="#CFD8DC" stroke-width="0.8"/>
  <!-- Grip -->
  <rect x="30" y="28" width="4" height="8" rx="1" fill="#6D4C41"/>
  <!-- Grip wrapping -->
  <line x1="30.5" y1="30" x2="33.5" y2="30" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="30.5" y1="34" x2="33.5" y2="34" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Arrow nocked -->
  <line x1="34" y1="32" x2="54" y2="32" stroke="#A1887F" stroke-width="1.2"/>
  <!-- Arrowhead -->
  <polygon points="56,32 52,29 52,35" fill="#90A4AE"/>
  <!-- Arrow fletching -->
  <polygon points="36,31 38,32 36,33" fill="#CFD8DC" opacity="0.5"/>
  <!-- Elven rune on grip -->
  <circle cx="32" cy="32" r="1" fill="#B0BEC5" opacity="0.5"/>
</svg>