  <path d="M8 58C8 50 18 46 32 46C46 46 56 50 56 58V64H8V58Z" fill="#558B2F"/>
  <!-- Collar/neckline -->
  <rect x="28" y="46" width="8" height="6" rx="1" fill="#33691E"/>
  <!-- Epaulettes -->
  <rect x="10" y="52" width="8" height="3" rx="1" fill="#33691E"/>
  <rect x="46" y="52" width="8" height="3" rx="1" fill="#33691E"/>
