  <rect x="24" y="33" width="5" height="3" rx="1" fill="white"/>
  <rect x="35" y="33" width="5" height="3" rx="1" fill="white"/>
  <circle cx="27" cy="34.5" r="1.5" fill="#263238"/>
  <circle cx="37" cy="34.5" r="1.5" fill="#263238"/>
