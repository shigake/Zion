  <ellipse cx="32" cy="38" rx="12" ry="12" fill="#FFCC80"/>
  <!-- Nose guard -->
  <rect x="30" y="28" width="4" height="8" rx="1" fill="#FF8F00"/>
  <!-- Eyes - fierce -->
  <circle cx="25" cy="36" r="2" fill="white"/>
  <circle cx="39" cy="36" r="2" fill="white"/>
  <circle cx="25" cy="36" r="1" fill="#4E342E"/>
  <circle cx="39" cy="36" r="1" fill="#4E342E"/>
  <!-- Eyebrows -->
  <path d="M21 33L28 34" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M43 33L36 34" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mouth -->
  <line x1="28" y1="44" x2="36" y2="44" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chin/jaw -->
  <path d="M20 44C24 50 40 50 44 44" stroke="#E0A060" stroke-width="0.8" fill="none"/>
  <!-- Shoulders - armor -->
  <path d="M6 58C6 50 16 46 32 46C48 46 58 50 58 58V64H6V58Z" fill="#FFB300"/>
  <!-- Armor detail -->
  <path d="M6 58C6 54 14 50 22 48" stroke="#FF8F00" stroke-width="1.5"/>
  <path d="M58 58C58 54 50 50 42 48" stroke="#FF8F00" stroke-width="1.5"/>
  <!-- Shoulder plates -->
  <ellipse cx="14" cy="54" rx="6" ry="4" fill="#FF8F00"/>
  <ellipse cx="50" cy="54" rx="6" ry="4" fill="#FF8F00"/>
</svg>