  <!-- Helmet crest -->
  <path d="M30 8C30 8 30 4 32 2C34 4 34 8 34 8" fill="#D32F2F"/>
  <path d="M28 10C28 6 30 2 32 2C34 2 36 6 36 10" fill="#D32F2F"/>
