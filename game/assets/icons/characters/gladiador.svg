  <path d="M30 4C28 6 28 12 30 16" stroke="#B71C1C" stroke-width="0.5"/>
  <path d="M34 4C36 6 36 12 34 16" stroke="#B71C1C" stroke-width="0.5"/>
  <!-- Helmet brim -->
  <rect x="12" y="28" width="40" height="4" rx="1" fill="#FF8F00"/>
