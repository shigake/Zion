<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark silhouette head -->
  <ellipse cx="32" cy="30" rx="16" ry="18" fill="#37474F"/>
  <!-- Darker inner shadow -->
  <ellipse cx="32" cy="30" rx="13" ry="15" fill="#263238"/>
  <!-- Silhouette body -->
  <path d="M6 58C6 48 16 42 32 42C48 42 58 48 58 58V64H6V58Z" fill="#37474F"/>
  <!-- Inner body shadow -->
  <path d="M10 58C10 50 20 44 32 44C44 44 54 50 54 58V64H10V58Z" fill="#263238"/>
  <!-- Question mark - gold -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFD700">?</text>
  <!-- Question mark glow -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFD700" opacity="0.3" filter="url(#glow)">?</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Subtle outline glow -->
  <ellipse cx="32" cy="30" rx="16" ry="18" stroke="#FFD700" stroke-width="0.5" fill="none" opacity="0.3"/>
  <!-- Mysterious sparkles -->
  <circle cx="16" cy="16" r="1" fill="#FFD700" opacity="0.6"/>
  <circle cx="48" cy="20" r="0.8" fill="#FFD700" opacity="0.4"/>
  <circle cx="12" cy="36" r="0.6" fill="#FFD700" opacity="0.5"/>
  <circle cx="52" cy="38" r="0.7" fill="#FFD700" opacity="0.3"/>
  <circle cx="20" cy="10" r="0.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="44" cy="12" r="0.9" fill="#FFD700" opacity="0.5"/>
</svg>