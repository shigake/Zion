<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hair - slicked back -->
  <path d="M16 24C16 14 22 8 32 8C42 8 48 14 48 24V28H16V24Z" fill="#212121"/>
  <!-- Widow's peak -->
  <path d="M22 20L32 14L42 20H22Z" fill="#212121"/>
  <!-- Face - very pale -->
  <ellipse cx="32" cy="34" rx="14" ry="15" fill="#F5F5F5"/>
  <!-- Cheekbones - gaunt -->
  <ellipse cx="22" cy="36" rx="3" ry="5" fill="#E0E0E0" opacity="0.5"/>
  <ellipse cx="42" cy="36" rx="3" ry="5" fill="#E0E0E0" opacity="0.5"/>
  <!-- Eyes - red -->
  <ellipse cx="26" cy="32" rx="3" ry="2.5" fill="white"/>
  <ellipse cx="38" cy="32" rx="3" ry="2.5" fill="white"/>
  <circle cx="26" cy="32" r="1.5" fill="#F44336"/>
  <circle cx="38" cy="32" r="1.5" fill="#F44336"/>
  <circle cx="26" cy="31.5" r="0.5" fill="#FF8A80"/>
  <circle cx="38" cy="31.5" r="0.5" fill="#FF8A80"/>
  <!-- Red eye glow -->
  <circle cx="26" cy="32" r="4" fill="#F44336" opacity="0.12"/>
  <circle cx="38" cy="32" r="4" fill="#F44336" opacity="0.12"/>
  <!-- Sharp eyebrows -->
  <path d="M20 28L30 29" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M44 28L34 29" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M32 35L31 38H33Z" fill="#E0E0E0"/>
  <!-- Mouth with fangs -->
  <path d="M27 42C29 43 35 43 37 42" stroke="#B71C1C" stroke-width="1" fill="none"/>
  <!-- Fangs -->
  <path d="M28 42L27 45L29 42" fill="white"/>
  <path d="M36 42L37 45L35 42" fill="white"/>
  <!-- High collar / cape -->
  <path d="M6 64C6 52 16 46 32 46C48 46 58 52 58 64H6Z" fill="#212121"/>
  <!-- Cape collar points -->
  <path d="M14 46L8 32L18 44Z" fill="#B71C1C"/>
  <path d="M50 46L56 32L46 44Z" fill="#B71C1C"/>
  <!-- Inner cape/shirt -->
  <path d="M26 46L32 54L38 46" fill="#B71C1C"/>
  <!-- Collar edge -->
  <path d="M14 46C14 46 22 44 32 44C42 44 50 46 50 46" stroke="#B71C1C" stroke-width="1"/>
