<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Glow -->
  <ellipse cx="32" cy="34" rx="20" ry="22" fill="#9C27B020"/>
  <!-- Crystal body - geometric facets -->
  <polygon points="32,4 44,20 44,44 32,60 20,44 20,20" fill="#9C27B0" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Left facet -->
  <polygon points="32,4 20,20 20,44 32,34" fill="#AB47BC" opacity="0.8"/>
  <!-- Right facet -->
  <polygon points="32,4 44,20 44,44 32,34" fill="#7B1FA2" opacity="0.8"/>
  <!-- Bottom facet -->
  <polygon points="20,44 32,60 44,44 32,34" fill="#6A1B9A"/>
  <!-- Inner glow line -->
  <line x1="32" y1="10" x2="32" y2="52" stroke="#E1BEE7" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="22" x2="40" y2="42" stroke="#E1BEE7" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="22" x2="24" y2="42" stroke="#E1BEE7" stroke-width="1" opacity="0.4"/>
  <!-- Sparkle highlights -->
  <circle cx="28" cy="18" r="2" fill="#E1BEE7" opacity="0.7"/>
  <circle cx="36" cy="30" r="1.5" fill="#F3E5F5" opacity="0.8"/>
  <circle cx="26" cy="40" r="1" fill="#E1BEE7" opacity="0.6"/>
  <!-- Sparkle stars around -->
  <path d="M10 16 L12 14 L14 16 L12 18Z" fill="#CE93D8" opacity="0.6"/>
  <path d="M50 12 L52 10 L54 12 L52 14Z" fill="#CE93D8" opacity="0.6"/>
  <path d="M52 48 L54 46 L56 48 L54 50Z" fill="#CE93D8" opacity="0.5"/>
</svg>