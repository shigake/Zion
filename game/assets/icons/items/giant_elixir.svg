<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bottle body -->
  <path d="M18 30 L16 50 Q16 58 24 58 L40 58 Q48 58 48 50 L46 30Z" fill="#388E3C" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Liquid -->
  <path d="M17 34 L47 34 L48 50 Q48 58 40 58 L24 58 Q16 58 16 50Z" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.5"/>
  <!-- Bottle neck -->
  <rect x="26" y="12" width="12" height="18" rx="2" fill="#43A047" stroke="#2E7D32" stroke-width="1"/>
  <!-- Cork -->
  <rect x="25" y="6" width="14" height="8" rx="3" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Label -->
  <rect x="22" y="38" width="20" height="12" rx="2" fill="#FFF8E1" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Up arrow on label (growth symbol) -->
  <path d="M32 40 L28 46 L30 46 L30 48 L34 48 L34 46 L36 46Z" fill="#2E7D32"/>
  <!-- Glass highlights -->
  <path d="M20 32 L20 50 Q20 54 24 56" stroke="#A5D6A7" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Bubbles -->
  <circle cx="24" cy="48" r="2" fill="#81C784" opacity="0.5"/>
  <circle cx="36" cy="52" r="1.5" fill="#81C784" opacity="0.4"/>
  <circle cx="28" cy="54" r="1" fill="#81C784" opacity="0.4"/>
  <circle cx="40" cy="46" r="1.5" fill="#81C784" opacity="0.3"/>
  <!-- Size indicator lines -->
  <line x1="10" y1="58" x2="10" y2="20" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <path d="M8 22 L10 18 L12 22" stroke="#A5D6A7" stroke-width="1" fill="none" opacity="0.5"/>
  <line x1="8" y1="58" x2="12" y2="58" stroke="#A5D6A7" stroke-width="1" opacity="0.5"/>
</svg>