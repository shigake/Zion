<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Clock body -->
  <circle cx="32" cy="34" r="24" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
  <!-- Clock face -->
  <circle cx="32" cy="34" r="20" fill="#FFF8E1" stroke="#F57C00" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="32" y1="16" x2="32" y2="19" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="49" x2="32" y2="52" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="34" x2="17" y2="34" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <line x1="47" y1="34" x2="50" y2="34" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="32" y1="34" x2="26" y2="24" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="32" y1="34" x2="42" y2="22" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="2" fill="#5D4037"/>
  <!-- Crack lines -->
  <path d="M40 18 L36 26 L42 30 L38 36" stroke="#E65100" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M36 26 L40 24 L44 28" stroke="#E65100" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Shattered glass shards -->
  <path d="M44 14 L48 10 L50 14 L46 16Z" fill="#FFF8E1" stroke="#F57C00" stroke-width="0.5" opacity="0.8"/>
  <path d="M50 18 L54 16 L52 20Z" fill="#FFF8E1" stroke="#F57C00" stroke-width="0.5" opacity="0.6"/>
  <!-- Top knob -->
  <rect x="29" y="6" width="6" height="6" rx="2" fill="#E65100"/>
</svg>