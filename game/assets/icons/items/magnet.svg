<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- U-shape magnet body -->
  <path d="M12 10 L12 38 C12 50 22 58 32 58 C42 58 52 50 52 38 L52 10 L42 10 L42 38 C42 44 38 48 32 48 C26 48 22 44 22 38 L22 10Z" fill="#9E9E9E" stroke="#757575" stroke-width="1.5"/>
  <!-- Red pole (left) -->
  <rect x="12" y="10" width="10" height="14" rx="1" fill="#F44336" stroke="#D32F2F" stroke-width="1"/>
  <!-- Blue pole (right) -->
  <rect x="42" y="10" width="10" height="14" rx="1" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <!-- Pole stripes -->
  <line x1="14" y1="18" x2="20" y2="18" stroke="#EF9A9A" stroke-width="1"/>
  <line x1="44" y1="18" x2="50" y2="18" stroke="#90CAF9" stroke-width="1"/>
  <!-- Magnetic field lines -->
  <path d="M17 8 C17 2 47 2 47 8" stroke="#FFD54F" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M17 5 C17 -3 47 -3 47 5" stroke="#FFD54F" stroke-width="1" fill="none" stroke-dasharray="2,2" opacity="0.5"/>
  <!-- Attract particles -->
  <circle cx="8" cy="6" r="2" fill="#FFD54F" opacity="0.6"/>
  <circle cx="56" cy="4" r="1.5" fill="#FFD54F" opacity="0.5"/>
  <circle cx="32" cy="2" r="1.5" fill="#FFD54F" opacity="0.7"/>
</svg>