  <ellipse cx="32" cy="52" rx="22" ry="4" fill="#B8860B" opacity="0.3"/>
  <!-- Crown base band -->
  <rect x="10" y="42" width="44" height="8" rx="2" fill="#FFC107" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Crown body -->
  <path d="M10 42 L6 16 L20 28 L32 10 L44 28 L58 16 L54 42Z" fill="#FFC107" stroke="#F9A825" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Crown inner -->
  <path d="M12 42 L8 18 L20 28 L32 14 L44 28 L56 18 L52 42Z" fill="#FFD54F"/>
  <!-- Tip circles -->
  <circle cx="6" cy="16" r="3" fill="#FFD700" stroke="#F9A825" stroke-width="1"/>
  <circle cx="32" cy="10" r="3.5" fill="#FFD700" stroke="#F9A825" stroke-width="1"/>
  <circle cx="58" cy="16" r="3" fill="#FFD700" stroke="#F9A825" stroke-width="1"/>
  <!-- Gems -->
  <circle cx="22" cy="44" r="3" fill="#F44336" stroke="#D32F2F" stroke-width="0.5"/>
  <circle cx="32" cy="44" r="3.5" fill="#2196F3" stroke="#1976D2" stroke-width="0.5"/>
  <circle cx="42" cy="44" r="3" fill="#4CAF50" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Gem highlights -->
  <circle cx="21" cy="43" r="1" fill="#EF9A9A" opacity="0.6"/>
  <circle cx="31" cy="43" r="1" fill="#90CAF9" opacity="0.6"/>
  <circle cx="41" cy="43" r="1" fill="#A5D6A7" opacity="0.6"/>
  <!-- Band decoration -->
  <line x1="14" y1="46" x2="18" y2="46" stroke="#F9A825" stroke-width="1"/>
  <line x1="26" y1="46" x2="28" y2="46" stroke="#F9A825" stroke-width="1"/>
  <line x1="36" y1="46" x2="38" y2="46" stroke="#F9A825" stroke-width="1"/>
  <line x1="46" y1="46" x2="50" y2="46" stroke="#F9A825" stroke-width="1"/>
  <!-- Cross-hatch on crown body -->
  <path d="M16 38 L18 30" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <path d="M26 34 L28 26" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <path d="M36 34 L38 26" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <path d="M46 38 L48 30" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <!-- Sparkle -->
  <path d="M32 4 L33 7 L36 6 L33 8 L34 11 L32 8 L30 11 L31 8 L28 6 L31 7Z" fill="#FFF9C4" opacity="0.8"/>
