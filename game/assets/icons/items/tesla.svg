<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Base platform -->
  <rect x="18" y="52" width="28" height="6" rx="2" fill="#424242" stroke="#333" stroke-width="1"/>
  <rect x="22" y="48" width="20" height="6" rx="1" fill="#616161" stroke="#424242" stroke-width="1"/>
  <!-- Coil body -->
  <rect x="26" y="20" width="12" height="30" rx="3" fill="#FFD600" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Coil windings -->
  <line x1="26" y1="25" x2="38" y2="25" stroke="#F57F17" stroke-width="1"/>
  <line x1="26" y1="30" x2="38" y2="30" stroke="#F57F17" stroke-width="1"/>
  <line x1="26" y1="35" x2="38" y2="35" stroke="#F57F17" stroke-width="1"/>
  <line x1="26" y1="40" x2="38" y2="40" stroke="#F57F17" stroke-width="1"/>
  <line x1="26" y1="45" x2="38" y2="45" stroke="#F57F17" stroke-width="1"/>
  <!-- Top sphere -->
  <circle cx="32" cy="16" r="8" fill="#FFD600" stroke="#F9A825" stroke-width="1.5"/>
  <circle cx="30" cy="14" r="2.5" fill="#FFF9C4" opacity="0.6"/>
  <!-- Lightning bolts -->
  <path d="M24 14 L18 8 L22 12 L14 4" stroke="#FFFF00" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 14 L46 8 L42 12 L50 4" stroke="#FFFF00" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M32 8 L30 2 L34 5 L32 0" stroke="#FFFF00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Small sparks -->
  <circle cx="14" cy="4" r="1.5" fill="#FFFF8D" opacity="0.7"/>
  <circle cx="50" cy="4" r="1.5" fill="#FFFF8D" opacity="0.7"/>
  <circle cx="8" cy="10" r="1" fill="#FFFF8D" opacity="0.5"/>
  <circle cx="56" cy="10" r="1" fill="#FFFF8D" opacity="0.5"/>
  <!-- Electric arc -->
  <path d="M24 18 Q20 22 16 20" stroke="#FFFF00" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M40 18 Q44 22 48 20" stroke="#FFFF00" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
</svg>