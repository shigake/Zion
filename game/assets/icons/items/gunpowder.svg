<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Barrel body -->
  <ellipse cx="32" cy="54" rx="18" ry="5" fill="#5D4037"/>
  <rect x="14" y="16" width="36" height="38" rx="2" fill="#795548" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Barrel top -->
  <ellipse cx="32" cy="16" rx="18" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Barrel bands -->
  <rect x="12" y="24" width="40" height="3" rx="1" fill="#5D4037"/>
  <rect x="12" y="42" width="40" height="3" rx="1" fill="#5D4037"/>
  <!-- Wood grain -->
  <line x1="22" y1="16" x2="22" y2="54" stroke="#6D4C41" stroke-width="0.5" opacity="0.5"/>
  <line x1="32" y1="16" x2="32" y2="54" stroke="#6D4C41" stroke-width="0.5" opacity="0.5"/>
  <line x1="42" y1="16" x2="42" y2="54" stroke="#6D4C41" stroke-width="0.5" opacity="0.5"/>
  <!-- Skull/danger symbol -->
  <circle cx="32" cy="34" r="5" fill="#4E342E"/>
  <text x="32" y="37" text-anchor="middle" font-size="8" fill="#FFCC80" font-weight="bold">!</text>
  <!-- Fuse -->
  <path d="M32 12 Q36 6 40 4 Q42 3 44 4" stroke="#8D6E63" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Fuse spark -->
  <circle cx="44" cy="4" r="3" fill="#FF9800" opacity="0.8"/>
  <circle cx="44" cy="4" r="2" fill="#FFEB3B"/>
  <circle cx="44" cy="4" r="1" fill="#FFF9C4"/>
  <!-- Spark lines -->
  <line x1="44" y1="0" x2="44" y2="2" stroke="#FFEB3B" stroke-width="1" stroke-linecap="round"/>
  <line x1="48" y1="4" x2="46" y2="4" stroke="#FFEB3B" stroke-width="1" stroke-linecap="round"/>
  <line x1="47" y1="1" x2="46" y2="2" stroke="#FFEB3B" stroke-width="1" stroke-linecap="round"/>
</svg>