<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#F44336" stroke-width="2" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#F44336" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#F44336" stroke-width="1.5" opacity="0.8"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="2" x2="32" y2="20" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="62" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="32" x2="20" y2="32" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="62" y2="32" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <!-- Center laser dot glow -->
  <circle cx="32" cy="32" r="6" fill="#F44336" opacity="0.2"/>
  <circle cx="32" cy="32" r="4" fill="#F44336" opacity="0.4"/>
  <circle cx="32" cy="32" r="2.5" fill="#FF5252"/>
  <circle cx="32" cy="32" r="1.5" fill="#FF8A80"/>
  <circle cx="32" cy="32" r="0.8" fill="#FFCDD2"/>
  <!-- Tick marks on crosshairs -->
  <line x1="30" y1="6" x2="34" y2="6" stroke="#F44336" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="58" x2="34" y2="58" stroke="#F44336" stroke-width="1" opacity="0.5"/>
  <line x1="6" y1="30" x2="6" y2="34" stroke="#F44336" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="30" x2="58" y2="34" stroke="#F44336" stroke-width="1" opacity="0.5"/>
  <!-- Laser beam effect (subtle) -->
  <line x1="32" y1="0" x2="32" y2="64" stroke="#FF1744" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="#FF1744" stroke-width="0.5" opacity="0.15"/>
</svg>