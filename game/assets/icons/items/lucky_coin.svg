<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Coin shadow -->
  <ellipse cx="34" cy="36" rx="22" ry="22" fill="#B8860B" opacity="0.3"/>
  <!-- Coin edge (thickness) -->
  <ellipse cx="32" cy="34" rx="22" ry="22" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <!-- Coin face -->
  <circle cx="32" cy="32" r="22" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#DAA520" stroke-width="1.5"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#FFC107" stroke-width="1"/>
  <!-- Four-leaf clover (luck symbol) -->
  <circle cx="32" cy="26" r="4" fill="#DAA520"/>
  <circle cx="32" cy="38" r="4" fill="#DAA520"/>
  <circle cx="26" cy="32" r="4" fill="#DAA520"/>
  <circle cx="38" cy="32" r="4" fill="#DAA520"/>
  <circle cx="32" cy="32" r="2" fill="#FFD700"/>
  <!-- Star decorations -->
  <circle cx="20" cy="18" r="1.5" fill="#FFF8E1" opacity="0.6"/>
  <circle cx="44" cy="18" r="1.5" fill="#FFF8E1" opacity="0.6"/>
  <circle cx="20" cy="46" r="1.5" fill="#FFF8E1" opacity="0.6"/>
  <circle cx="44" cy="46" r="1.5" fill="#FFF8E1" opacity="0.6"/>
  <!-- Shine highlight -->
  <path d="M20 16 Q24 12 32 12" stroke="#FFF8E1" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Sparkle -->
  <path d="M52 8 L54 12 L58 10 L54 14 L56 18 L52 14 L48 16 L52 12Z" fill="#FFEB3B" opacity="0.7"/>
  <path d="M8 48 L10 52 L14 50 L10 54Z" fill="#FFEB3B" opacity="0.5"/>
</svg>