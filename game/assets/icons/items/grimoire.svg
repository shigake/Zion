<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Book shadow/pages side -->
  <rect x="14" y="10" width="4" height="46" rx="1" fill="#E0E0E0"/>
  <!-- Book back cover -->
  <rect x="12" y="8" width="40" height="48" rx="3" fill="#1A0033" stroke="#4A148C" stroke-width="1.5"/>
  <!-- Book front cover -->
  <rect x="14" y="10" width="38" height="44" rx="2" fill="#4A148C" stroke="#311B92" stroke-width="1"/>
  <!-- Spine -->
  <rect x="14" y="10" width="4" height="44" fill="#311B92"/>
  <!-- Book border decoration -->
  <rect x="20" y="16" width="28" height="32" rx="1" fill="none" stroke="#7C4DFF" stroke-width="1" opacity="0.6"/>
  <!-- Pentagram -->
  <circle cx="34" cy="32" r="10" fill="none" stroke="#7C4DFF" stroke-width="1.5"/>
  <!-- Star points -->
  <polygon points="34,22 36.5,28.5 43.5,28.5 38,33 40,40 34,36 28,40 30,33 24.5,28.5 31.5,28.5" fill="none" stroke="#B388FF" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner pentagon -->
  <polygon points="34,26 38.5,30 37,36 31,36 29.5,30" fill="#7C4DFF" opacity="0.3"/>
  <!-- Glow from pentagram center -->
  <circle cx="34" cy="32" r="3" fill="#B388FF" opacity="0.4"/>
  <circle cx="34" cy="32" r="1.5" fill="#E1BEE7" opacity="0.6"/>
  <!-- Corner decorations -->
  <path d="M22 18 L26 18 L22 22" stroke="#7C4DFF" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M46 18 L42 18 L46 22" stroke="#7C4DFF" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M22 46 L26 46 L22 42" stroke="#7C4DFF" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M46 46 L42 46 L46 42" stroke="#7C4DFF" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Metal clasp -->
  <rect x="50" y="28" width="4" height="8" rx="1" fill="#9E9E9E" stroke="#757575" stroke-width="0.5"/>
  <!-- Bookmark ribbon -->
  <path d="M40 54 L40 60 L42 58 L44 60 L44 54" fill="#B71C1C"/>
</svg>