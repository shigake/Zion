<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="#455A64"/>
  <circle cx="32" cy="32" r="24" fill="#546E7A"/>
  <!-- Inner face -->
  <circle cx="32" cy="32" r="21" fill="#ECEFF1"/>
  <!-- Cardinal marks -->
  <text x="32" y="16" text-anchor="middle" font-size="7" font-weight="bold" fill="#455A64" font-family="Arial">N</text>
  <text x="32" y="53" text-anchor="middle" font-size="6" fill="#78909C" font-family="Arial">S</text>
  <text x="12" y="35" text-anchor="middle" font-size="6" fill="#78909C" font-family="Arial">W</text>
  <text x="52" y="35" text-anchor="middle" font-size="6" fill="#78909C" font-family="Arial">E</text>
  <!-- Tick marks -->
  <line x1="32" y1="12" x2="32" y2="15" stroke="#455A64" stroke-width="1.5"/>
  <line x1="32" y1="49" x2="32" y2="52" stroke="#455A64" stroke-width="1.5"/>
  <line x1="12" y1="32" x2="15" y2="32" stroke="#455A64" stroke-width="1.5"/>
  <line x1="49" y1="32" x2="52" y2="32" stroke="#455A64" stroke-width="1.5"/>
  <!-- Needle - red north -->
  <polygon points="32,16 29,32 35,32" fill="#F44336"/>
  <!-- Needle - white south -->
  <polygon points="32,48 29,32 35,32" fill="#CFD8DC"/>
  <!-- Center pin -->
  <circle cx="32" cy="32" r="3" fill="#FFD700"/>
  <circle cx="32" cy="32" r="1.5" fill="#B8860B"/>
  <!-- Outer ring border -->
  <circle cx="32" cy="32" r="26" stroke="#37474F" stroke-width="2" fill="none"/>
</svg>