<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shadow -->
  <ellipse cx="34" cy="58" rx="20" ry="3" fill="#000" opacity="0.1"/>
  <!-- Key shaft -->
  <rect x="30" y="24" width="4" height="30" rx="1" fill="#FFD700"/>
  <!-- Key shaft detail line -->
  <line x1="32" y1="28" x2="32" y2="52" stroke="#FFC107" stroke-width="1"/>
  <!-- Key teeth -->
  <rect x="26" y="48" width="4" height="6" rx="1" fill="#FFD700"/>
  <rect x="22" y="44" width="4" height="10" rx="1" fill="#FFD700"/>
  <rect x="34" y="50" width="4" height="4" rx="1" fill="#FFD700"/>
  <!-- Key bow (top ornate circle) -->
  <circle cx="32" cy="16" r="12" fill="#FFD700"/>
  <circle cx="32" cy="16" r="8" fill="none" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="32" cy="16" r="5" fill="#FFC107"/>
  <!-- Ornate details on bow -->
  <circle cx="32" cy="16" r="2.5" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <!-- Crown-like top detail -->
  <circle cx="32" cy="4" r="2" fill="#FFD700"/>
  <circle cx="24" cy="8" r="1.5" fill="#FFD700"/>
  <circle cx="40" cy="8" r="1.5" fill="#FFD700"/>
  <!-- Key outline -->
  <circle cx="32" cy="16" r="12" stroke="#B8860B" stroke-width="1.5" fill="none"/>
  <!-- Highlight -->
  <path d="M26 10 Q30 6 36 8" stroke="white" stroke-width="1" fill="none" opacity="0.4"/>
</svg>