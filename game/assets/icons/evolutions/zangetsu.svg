<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="zg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Red aura glow -->
  <line x1="48" y1="8" x2="16" y2="48" stroke="#F44336" stroke-width="10" opacity="0.3" filter="url(#zg)"/>
  <line x1="48" y1="8" x2="16" y2="48" stroke="#F44336" stroke-width="6" opacity="0.2"/>
  <!-- Blade body -->
  <polygon points="46,6 50,10 20,46 14,48 16,42" fill="#212121"/>
  <!-- Blade edge highlight -->
  <polygon points="46,6 48,8 18,44 16,42" fill="#424242"/>
  <!-- Blade tip -->
  <polygon points="46,6 50,10 52,4" fill="#212121"/>
  <!-- Guard (tsuba) -->
  <rect x="12" y="44" width="12" height="3" rx="1" fill="#616161" transform="rotate(-45,18,46)"/>
  <!-- Handle wrap -->
  <line x1="14" y1="48" x2="8" y2="56" stroke="#212121" stroke-width="4" stroke-linecap="round"/>
  <line x1="13" y1="49" x2="9" y2="55" stroke="#F44336" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Red energy wisps -->
  <path d="M40 14 Q44 12 42 8" stroke="#F44336" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M34 22 Q38 18 36 14" stroke="#F44336" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M26 34 Q30 30 28 26" stroke="#F44336" stroke-width="1" fill="none" opacity="0.5"/>
</svg>