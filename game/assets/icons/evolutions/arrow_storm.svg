<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="ars" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Motion blur background -->
  <rect x="0" y="0" width="64" height="64" fill="#90A4AE" opacity="0.05"/>
  <!-- Arrow 1 (center, largest) -->
  <line x1="32" y1="4" x2="32" y2="50" stroke="#795548" stroke-width="2.5"/>
  <polygon points="32,4 28,14 32,11 36,14" fill="#90A4AE"/>
  <polygon points="32,4 29,12 32,10 35,12" fill="#CFD8DC" opacity="0.6"/>
  <polygon points="28,48 32,50 36,48 34,46 30,46" fill="#795548"/>
  <!-- Arrow 2 (left) -->
  <line x1="18" y1="10" x2="18" y2="46" stroke="#795548" stroke-width="2"/>
  <polygon points="18,10 15,18 18,16 21,18" fill="#90A4AE"/>
  <polygon points="15,44 18,46 21,44 20,42 16,42" fill="#795548"/>
  <!-- Arrow 3 (right) -->
  <line x1="46" y1="8" x2="46" y2="44" stroke="#795548" stroke-width="2"/>
  <polygon points="46,8 43,16 46,14 49,16" fill="#90A4AE"/>
  <polygon points="43,42 46,44 49,42 48,40 44,40" fill="#795548"/>
  <!-- Arrow 4 (far left, angled) -->
  <line x1="8" y1="16" x2="12" y2="52" stroke="#795548" stroke-width="1.5" opacity="0.7"/>
  <polygon points="8,16 6,24 9,22 11,24" fill="#90A4AE" opacity="0.7"/>
  <!-- Arrow 5 (far right, angled) -->
  <line x1="56" y1="14" x2="52" y2="50" stroke="#795548" stroke-width="1.5" opacity="0.7"/>
  <polygon points="56,14 54,22 56,20 58,22" fill="#90A4AE" opacity="0.7"/>
  <!-- Arrow 6 (between left and center) -->
  <line x1="25" y1="12" x2="25" y2="42" stroke="#795548" stroke-width="1.5" opacity="0.5"/>
  <polygon points="25,12 23,18 25,16 27,18" fill="#90A4AE" opacity="0.5"/>
  <!-- Arrow 7 (between right and center) -->
  <line x1="39" y1="14" x2="39" y2="48" stroke="#795548" stroke-width="1.5" opacity="0.5"/>
  <polygon points="39,14 37,20 39,18 41,20" fill="#90A4AE" opacity="0.5"/>
  <!-- Speed lines -->
  <line x1="14" y1="30" x2="14" y2="36" stroke="#90A4AE" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="28" x2="50" y2="34" stroke="#90A4AE" stroke-width="0.5" opacity="0.3"/>
  <!-- Wind effect -->
  <path d="M4 38 Q10 36 16 38" stroke="#90A4AE" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M48 40 Q54 38 60 40" stroke="#90A4AE" stroke-width="0.5" fill="none" opacity="0.3"/>
</svg>