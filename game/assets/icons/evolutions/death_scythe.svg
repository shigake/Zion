  <path d="M12 6 Q8 6 8 14 Q8 26 28 28" stroke="#69F0AE" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Ghost wisps -->
  <path d="M12 12 Q6 14 8 20" stroke="#69F0AE" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M16 16 Q10 20 14 24" stroke="#69F0AE" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Soul particles -->
  <circle cx="10" cy="10" r="1.5" fill="#69F0AE" opacity="0.5"/>
  <circle cx="6" cy="18" r="1" fill="#69F0AE" opacity="0.4"/>
  <circle cx="14" cy="26" r="1" fill="#69F0AE" opacity="0.3"/>
</svg>