<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="nl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Glow -->
  <circle cx="14" cy="22" r="10" fill="#FFEB3B" opacity="0.15" filter="url(#nl)"/>
  <!-- Launcher tube -->
  <rect x="16" y="28" width="40" height="12" rx="3" fill="#424242"/>
  <rect x="16" y="28" width="40" height="6" rx="3" fill="#616161" opacity="0.5"/>
  <!-- Barrel opening -->
  <ellipse cx="16" cy="34" rx="3" ry="6" fill="#212121"/>
  <!-- Scope -->
  <rect x="34" y="22" width="10" height="6" rx="2" fill="#616161"/>
  <circle cx="34" cy="25" r="2" fill="#FF6F00"/>
  <!-- Handle -->
  <rect x="40" y="40" width="6" height="12" rx="2" fill="#424242"/>
  <!-- Grip -->
  <rect x="28" y="40" width="4" height="8" rx="1" fill="#424242"/>
  <!-- Nuclear warhead tip -->
  <path d="M6 34 Q4 34 4 30 Q4 24 10 22 Q14 20 16 28 L16 40 Q14 42 10 40 Q4 38 4 34 Z" fill="#FF6F00"/>
  <!-- Radiation symbol on warhead -->
  <circle cx="10" cy="32" r="5" fill="none" stroke="#FFEB3B" stroke-width="1.5"/>
  <circle cx="10" cy="32" r="1.5" fill="#FFEB3B"/>
  <!-- Radiation fins -->
  <path d="M10 27 L8 30 L12 30 Z" fill="#FFEB3B"/>
  <path d="M14 34 L12 31 L12 37 Z" fill="#FFEB3B"/>
  <path d="M6 34 L8 31 L8 37 Z" fill="#FFEB3B"/>
  <!-- Warning stripes -->
  <line x1="20" y1="38" x2="24" y2="38" stroke="#FFEB3B" stroke-width="1.5"/>
  <line x1="20" y1="30" x2="24" y2="30" stroke="#FFEB3B" stroke-width="1.5"/>
</svg>