<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="bs" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Frost glow -->
  <circle cx="32" cy="32" r="28" fill="#E1F5FE" opacity="0.2" filter="url(#bs)"/>
  <!-- Outer shuriken blades (4 points) -->
  <polygon points="32,2 36,24 32,20 28,24" fill="#00BCD4"/>
  <polygon points="62,32 40,36 44,32 40,28" fill="#00BCD4"/>
  <polygon points="32,62 28,40 32,44 36,40" fill="#00BCD4"/>
  <polygon points="2,32 24,28 20,32 24,36" fill="#00BCD4"/>
  <!-- Diagonal blades -->
  <polygon points="50,8 38,26 36,24 38,22" fill="#00ACC1"/>
  <polygon points="56,56 38,38 40,36 42,38" fill="#00ACC1"/>
  <polygon points="8,56 26,38 28,40 26,42" fill="#00ACC1"/>
  <polygon points="8,8 26,26 24,28 22,26" fill="#00ACC1"/>
  <!-- Center ring -->
  <circle cx="32" cy="32" r="8" fill="#00BCD4"/>
  <circle cx="32" cy="32" r="5" fill="#E1F5FE"/>
  <circle cx="32" cy="32" r="3" fill="#B2EBF2"/>
  <!-- Ice crystal details on blades -->
  <line x1="32" y1="6" x2="32" y2="18" stroke="#E1F5FE" stroke-width="1" opacity="0.7"/>
  <line x1="46" y1="32" x2="58" y2="32" stroke="#E1F5FE" stroke-width="1" opacity="0.7"/>
  <line x1="32" y1="46" x2="32" y2="58" stroke="#E1F5FE" stroke-width="1" opacity="0.7"/>
  <line x1="6" y1="32" x2="18" y2="32" stroke="#E1F5FE" stroke-width="1" opacity="0.7"/>
  <!-- Frost particles -->
  <circle cx="12" cy="12" r="1.5" fill="#E1F5FE" opacity="0.5"/>
  <circle cx="52" cy="12" r="1" fill="#E1F5FE" opacity="0.4"/>
  <circle cx="52" cy="52" r="1.5" fill="#E1F5FE" opacity="0.5"/>
  <circle cx="12" cy="52" r="1" fill="#E1F5FE" opacity="0.4"/>
</svg>