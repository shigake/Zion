<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="es" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Storm cloud -->
  <ellipse cx="32" cy="14" rx="22" ry="10" fill="#1A237E"/>
  <ellipse cx="22" cy="12" rx="12" ry="8" fill="#283593"/>
  <ellipse cx="42" cy="12" rx="12" ry="8" fill="#283593"/>
  <ellipse cx="32" cy="10" rx="16" ry="7" fill="#303F9F" opacity="0.5"/>
  <!-- Main lightning bolt (center) -->
  <polygon points="32,20 28,32 34,32 26,50 38,36 32,36 38,24" fill="#FFD600" filter="url(#es)"/>
  <polygon points="32,22 29,32 34,31 28,46 36,36 32,35 36,26" fill="#FFFF00" opacity="0.7"/>
  <!-- Left lightning -->
  <polygon points="16,18 14,28 18,28 12,40 20,30 16,30 20,22" fill="#FFD600" opacity="0.7"/>
  <polygon points="16,19 15,27 18,27 14,37 19,30 16,29 19,23" fill="#FFFF00" opacity="0.5"/>
  <!-- Right lightning -->
  <polygon points="48,18 46,28 50,28 44,40 52,30 48,30 52,22" fill="#FFD600" opacity="0.7"/>
  <polygon points="48,19 47,27 50,27 46,37 51,30 48,29 51,23" fill="#FFFF00" opacity="0.5"/>
  <!-- Electric sparks -->
  <circle cx="26" cy="46" r="2" fill="#FFD600" opacity="0.5"/>
  <circle cx="38" cy="42" r="1.5" fill="#FFD600" opacity="0.4"/>
  <circle cx="14" cy="36" r="1.5" fill="#FFD600" opacity="0.4"/>
  <circle cx="50" cy="36" r="1.5" fill="#FFD600" opacity="0.4"/>
  <!-- Small arcs -->
  <path d="M30 48 Q28 52 32 54" stroke="#FFD600" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M20 38 Q18 42 22 42" stroke="#FFD600" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M44 38 Q46 42 42 42" stroke="#FFD600" stroke-width="1" fill="none" opacity="0.4"/>
</svg>