<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="ld" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Purple aura -->
  <circle cx="32" cy="30" r="24" fill="#4A148C" opacity="0.15" filter="url(#ld)"/>
  <!-- Skull -->
  <ellipse cx="32" cy="30" rx="14" ry="16" fill="#E0E0E0"/>
  <!-- Eye sockets -->
  <ellipse cx="26" cy="28" rx="4" ry="5" fill="#4A148C"/>
  <ellipse cx="38" cy="28" rx="4" ry="5" fill="#4A148C"/>
  <!-- Glowing eyes -->
  <ellipse cx="26" cy="28" rx="2" ry="2.5" fill="#7C4DFF" opacity="0.8"/>
  <ellipse cx="38" cy="28" rx="2" ry="2.5" fill="#7C4DFF" opacity="0.8"/>
  <!-- Nose -->
  <path d="M30 34 L32 36 L34 34" fill="#4A148C"/>
  <!-- Teeth -->
  <rect x="24" y="38" width="4" height="5" rx="0.5" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <rect x="28" y="38" width="4" height="6" rx="0.5" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <rect x="32" y="38" width="4" height="6" rx="0.5" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <rect x="36" y="38" width="4" height="5" rx="0.5" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Crown -->
  <polygon points="18,18 22,10 26,16 30,6 34,16 38,10 42,16 46,8 46,20 18,20" fill="#FFD700"/>
  <polygon points="18,18 22,10 26,16 30,6 34,16 38,10 42,16 46,8 46,18 18,18" fill="#FFC107" opacity="0.5"/>
  <!-- Crown jewels -->
  <circle cx="30" cy="14" r="2" fill="#F44336"/>
  <circle cx="22" cy="16" r="1.5" fill="#4A148C"/>
  <circle cx="38" cy="16" r="1.5" fill="#4A148C"/>
  <!-- Ghost army (small skulls) -->
  <circle cx="8" cy="50" r="4" fill="#9E9E9E" opacity="0.5"/>
  <circle cx="6" cy="49" r="1" fill="#4A148C" opacity="0.5"/>
  <circle cx="10" cy="49" r="1" fill="#4A148C" opacity="0.5"/>
  <circle cx="56" cy="50" r="4" fill="#9E9E9E" opacity="0.5"/>
  <circle cx="54" cy="49" r="1" fill="#4A148C" opacity="0.5"/>
  <circle cx="58" cy="49" r="1" fill="#4A148C" opacity="0.5"/>
  <circle cx="14" cy="56" r="3" fill="#9E9E9E" opacity="0.35"/>
  <circle cx="50" cy="56" r="3" fill="#9E9E9E" opacity="0.35"/>
</svg>