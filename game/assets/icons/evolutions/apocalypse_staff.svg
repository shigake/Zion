<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="as" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fire glow behind crystal -->
  <circle cx="32" cy="14" r="14" fill="#FF6F00" opacity="0.25" filter="url(#as)"/>
  <!-- Staff body -->
  <rect x="30" y="20" width="4" height="38" rx="2" fill="#5D4037"/>
  <line x1="32" y1="22" x2="32" y2="56" stroke="#4E342E" stroke-width="1"/>
  <!-- Staff rings -->
  <rect x="28" y="24" width="8" height="3" rx="1" fill="#FF6F00"/>
  <rect x="29" y="30" width="6" height="2" rx="1" fill="#BF360C"/>
  <!-- Crystal holder -->
  <path d="M26 20 Q26 16 32 12 Q38 16 38 20 Z" fill="#BF360C"/>
  <!-- Flaming crystal -->
  <polygon points="32,6 27,18 32,16 37,18" fill="#FF6F00"/>
  <polygon points="32,8 29,16 32,14 35,16" fill="#FFAB00"/>
  <!-- Flames -->
  <path d="M28 10 Q24 4 28 2 Q26 8 30 6" fill="#F44336" opacity="0.8"/>
  <path d="M36 10 Q40 4 36 2 Q38 8 34 6" fill="#F44336" opacity="0.8"/>
  <path d="M32 6 Q30 0 32 -2 Q34 0 32 6" fill="#FFEB3B" opacity="0.7"/>
  <!-- Ember particles -->
  <circle cx="24" cy="8" r="1" fill="#FF6F00" opacity="0.6"/>
  <circle cx="40" cy="6" r="1" fill="#FF6F00" opacity="0.6"/>
  <circle cx="22" cy="4" r="0.8" fill="#FFAB00" opacity="0.5"/>
</svg>