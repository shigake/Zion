<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="mi" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hellfire glow at barrel -->
  <circle cx="8" cy="28" r="10" fill="#FF9800" opacity="0.2" filter="url(#mi)"/>
  <!-- Barrels (multiple tubes) -->
  <rect x="4" y="22" width="30" height="3" rx="1" fill="#424242"/>
  <rect x="4" y="26" width="30" height="3" rx="1" fill="#616161"/>
  <rect x="4" y="30" width="30" height="3" rx="1" fill="#424242"/>
  <rect x="4" y="34" width="30" height="3" rx="1" fill="#616161"/>
  <!-- Barrel ring -->
  <rect x="28" y="20" width="4" height="18" rx="1" fill="#F44336"/>
  <!-- Body -->
  <rect x="32" y="18" width="16" height="22" rx="3" fill="#B71C1C"/>
  <rect x="32" y="18" width="16" height="11" rx="3" fill="#F44336" opacity="0.4"/>
  <!-- Handle -->
  <rect x="42" y="40" width="6" height="14" rx="2" fill="#424242"/>
  <rect x="36" y="42" width="4" height="10" rx="2" fill="#424242"/>
  <!-- Ammo belt -->
  <rect x="48" y="22" width="10" height="8" rx="2" fill="#FF9800"/>
  <line x1="50" y1="22" x2="50" y2="30" stroke="#F57C00" stroke-width="1"/>
  <line x1="53" y1="22" x2="53" y2="30" stroke="#F57C00" stroke-width="1"/>
  <line x1="56" y1="22" x2="56" y2="30" stroke="#F57C00" stroke-width="1"/>
  <!-- Muzzle flames -->
  <path d="M4 24 Q-2 20 0 16 Q2 22 4 20" fill="#FF9800" opacity="0.9"/>
  <path d="M4 28 Q-4 28 -2 24 Q0 30 4 28" fill="#F44336" opacity="0.8"/>
  <path d="M4 32 Q-2 36 0 40 Q2 34 4 36" fill="#FF9800" opacity="0.9"/>
  <path d="M2 28 Q-4 26 -4 28 Q-4 30 2 30" fill="#FFEB3B" opacity="0.6"/>
  <!-- Heat glow lines -->
  <path d="M10 18 Q8 14 12 12" stroke="#FF9800" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M16 16 Q14 12 18 10" stroke="#FF9800" stroke-width="1" fill="none" opacity="0.4"/>
</svg>