name: Auto Release

# Dispara em push para main ou manualmente
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcar criacao de release mesmo fora do ciclo automatico'
        required: false
        default: 'false'

jobs:
  check-and-release:
    name: Verificar e criar release automatica
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historico completo para tags

      - name: Verificar se deve criar release
        id: check
        run: |
          VERSION=$(cat game/VERSION | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Verificar se a tag ja existe
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG ja existe. Nada a fazer."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/${TAG}" 2>/dev/null | grep -q "$TAG"; then
            echo "Tag $TAG ja existe no remote. Nada a fazer."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Forcar release via workflow_dispatch
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Release forcada via workflow_dispatch."
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extrair componentes da versao
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "Versao: $MAJOR.$MINOR.$PATCH"

          # Obter versao da ultima tag
          PREV_TAG=$(git tag --sort=-v:refname | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            PREV_VERSION="${PREV_TAG#v}"
            PREV_MINOR=$(echo "$PREV_VERSION" | cut -d. -f2)
            echo "Tag anterior: $PREV_TAG (minor=$PREV_MINOR)"

            # Auto-release em mudanca de minor (ex: 3.2.x -> 3.3.x)
            if [ "$MINOR" != "$PREV_MINOR" ]; then
              echo "Mudanca de minor version detectada ($PREV_MINOR -> $MINOR). Criando release."
              echo "should_release=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Auto-release a cada 10 patches (patch % 10 == 0)
          if [ "$PATCH" -gt 0 ] && [ $((PATCH % 10)) -eq 0 ]; then
            echo "Patch $PATCH e multiplo de 10. Criando release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Minor .0 tambem dispara (ex: 3.3.0)
          if [ "$PATCH" -eq 0 ]; then
            echo "Versao minor .0 detectada. Criando release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Nenhuma condicao de auto-release atendida (patch=$PATCH)."
          echo "should_release=false" >> $GITHUB_OUTPUT

      - name: Criar tag e disparar build
        if: steps.check.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.check.outputs.version }}"

          echo "Criando tag $TAG..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto-release $TAG"
          git push origin "$TAG"

          echo ""
          echo "Tag $TAG criada e enviada."
          echo "O workflow build.yml sera disparado automaticamente."
          echo "Release: https://github.com/shigake/Zion/releases/tag/$TAG"
