name: Build e Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao para o build (ex: 3.3.0)'
        required: false
      create_release:
        description: 'Criar GitHub Release? (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.1"

# ======================================================================
# JOB 1: Validacao — verifica versao e importa projeto
# ======================================================================
jobs:
  validate:
    name: Validar projeto
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ler versao
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -f game/VERSION ]; then
            VERSION=$(cat game/VERSION | tr -d '[:space:]')
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versao: $VERSION"

      - name: Verificar incremento de versao
        if: github.event.inputs.create_release == 'true'
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^v${CURRENT}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            PREV_VERSION="${PREV_TAG#v}"
            echo "Versao anterior: $PREV_VERSION → atual: $CURRENT"
            if [ "$CURRENT" = "$PREV_VERSION" ]; then
              echo "::error::game/VERSION ($CURRENT) nao foi incrementado em relacao a tag anterior ($PREV_TAG)."
              exit 1
            fi
          else
            echo "Nenhuma tag anterior. Pulando verificacao."
          fi

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot
            ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-export

      - name: Instalar Godot + Export Templates
        run: |
          if [ ! -f ~/godot/godot ]; then
            mkdir -p ~/godot
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O /tmp/godot.zip
            unzip -o /tmp/godot.zip -d ~/godot
            mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
            chmod +x ~/godot/godot
          fi
          echo "$HOME/godot" >> $GITHUB_PATH
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          if [ ! -d "$TEMPLATES_DIR" ]; then
            mkdir -p "$TEMPLATES_DIR"
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/templates.tpz
            unzip -o /tmp/templates.tpz -d /tmp/templates
            cp /tmp/templates/templates/* "$TEMPLATES_DIR/"
          fi

      - name: Validar projeto (headless import)
        run: |
          cd game
          godot --headless --import project.godot 2>&1 | tee /tmp/import.log
          SCRIPT_ERRORS=$(grep "SCRIPT ERROR:" /tmp/import.log | grep -c "Parse Error" 2>/dev/null || echo "0")
          if [ "$SCRIPT_ERRORS" -gt 0 ]; then
            grep "SCRIPT ERROR:" /tmp/import.log | grep "Parse Error" | head -10
            echo "::error::Projeto contem $SCRIPT_ERRORS erros de parse."
            exit 1
          fi
          echo "Projeto validado com sucesso."

  # ======================================================================
  # JOB 2: Build — exporta Windows e Linux em paralelo
  # ======================================================================
  build:
    name: Build (${{ matrix.platform }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: windows
            preset: "Windows Desktop"
            output: zion.exe
          - platform: linux
            preset: "Linux"
            output: zion.x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot
            ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-export

      - name: Instalar Godot + Export Templates
        run: |
          if [ ! -f ~/godot/godot ]; then
            mkdir -p ~/godot
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O /tmp/godot.zip
            unzip -o /tmp/godot.zip -d ~/godot
            mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
            chmod +x ~/godot/godot
          fi
          echo "$HOME/godot" >> $GITHUB_PATH
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          if [ ! -d "$TEMPLATES_DIR" ]; then
            mkdir -p "$TEMPLATES_DIR"
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/templates.tpz
            unzip -o /tmp/templates.tpz -d /tmp/templates
            cp /tmp/templates/templates/* "$TEMPLATES_DIR/"
          fi

      - name: Exportar ${{ matrix.platform }}
        run: |
          mkdir -p build
          cd game
          godot --headless --export-release "${{ matrix.preset }}" ../build/${{ matrix.output }} 2>&1 | tee /tmp/export.log
          if [ ! -f ../build/${{ matrix.output }} ]; then
            echo "::error::Falha ao exportar ${{ matrix.platform }}"
            cat /tmp/export.log
            exit 1
          fi
          SIZE=$(du -h ../build/${{ matrix.output }} | cut -f1)
          echo "Build ${{ matrix.platform }}: ${{ matrix.output }} ($SIZE)"

      - name: Verificar tamanho
        run: |
          SIZE_BYTES=$(stat -c%s build/${{ matrix.output }})
          SIZE_MB=$((SIZE_BYTES / 1048576))
          echo "${{ matrix.output }}: ${SIZE_MB}MB"
          if [ "$SIZE_BYTES" -lt 10485760 ]; then
            echo "::error::Build muito pequeno (${SIZE_MB}MB). Provavelmente incompleto."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/${{ matrix.output }}
          retention-days: 30

  # ======================================================================
  # JOB 3: Empacotar — junta builds + README em zips
  # ======================================================================
  package:
    name: Empacotar releases
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: build/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: build/

      - name: Criar pacotes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p "pkg/Zion-v${VERSION}"
          cp build/zion.exe "pkg/Zion-v${VERSION}/"
          cp build/zion.x86_64 "pkg/Zion-v${VERSION}/"
          cat > "pkg/Zion-v${VERSION}/LEIA-ME.txt" << 'EOF'
          ╔══════════════════════════════════════╗
          ║          ZION - Survivors            ║
          ║      Roguelite Co-op Online          ║
          ╚══════════════════════════════════════╝

          Como jogar:
          1. Execute zion.exe (Windows) ou ./zion.x86_64 (Linux)
          2. Se o Windows Defender alertar, clique em
             "Mais informacoes" > "Executar mesmo assim"

          Controles: WASD mover, armas auto-aim, TAB inventario, ESC pausa
          Multiplayer: Host cria sala, outros entram pelo IP

          Bugs? github.com/shigake/Zion/issues
          EOF
          cd pkg
          zip -r "../Zion-v${VERSION}-windows.zip" "Zion-v${VERSION}/zion.exe" "Zion-v${VERSION}/LEIA-ME.txt"
          zip -r "../Zion-v${VERSION}-linux.zip" "Zion-v${VERSION}/zion.x86_64" "Zion-v${VERSION}/LEIA-ME.txt"

      - name: Upload pacotes
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            Zion-v${{ needs.validate.outputs.version }}-windows.zip
            Zion-v${{ needs.validate.outputs.version }}-linux.zip
          retention-days: 30

  # ======================================================================
  # JOB 4: Release — cria tag, changelog e GitHub Release
  # ======================================================================
  release:
    name: GitHub Release
    needs: [validate, package]
    if: github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download pacotes
        uses: actions/download-artifact@v4
        with:
          name: release-packages

      - name: Gerar changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            FEATS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
            [ -n "$FEATS" ] && echo "### Novidades" && echo "$FEATS" && echo ""
            FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
            [ -n "$FIXES" ] && echo "### Correcoes" && echo "$FIXES" && echo ""
            PERFS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^perf" 2>/dev/null || true)
            [ -n "$PERFS" ] && echo "### Performance" && echo "$PERFS" && echo ""
            ALL=$(git log "$RANGE" --pretty=format:"- %s" 2>/dev/null || true)
            CONVENTIONAL=$(echo -e "${FEATS}\n${FIXES}\n${PERFS}" | grep -v "^$" | wc -l)
            TOTAL=$(echo "$ALL" | grep -v "^$" | wc -l)
            if [ "$CONVENTIONAL" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
              echo "### Mudancas" && echo "$ALL" && echo ""
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Criar tag
        run: |
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "Zion v${{ env.VERSION }}"
          body: |
            ## Zion v${{ env.VERSION }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### Como instalar
            **Windows:** Baixe o .zip, descompacte, execute `zion.exe`
            **Linux:** Baixe o .zip, `chmod +x zion.x86_64`, execute `./zion.x86_64`

            > Windows Defender pode alertar (executavel nao assinado). Clique "Mais informacoes" > "Executar mesmo assim".

            ### Requisitos
            - Windows 10/11 ou Linux (64-bit) com suporte Vulkan

            [Reportar bugs](https://github.com/shigake/Zion/issues)
          files: |
            Zion-v${{ env.VERSION }}-windows.zip
            Zion-v${{ env.VERSION }}-linux.zip
          draft: false
          prerelease: false

  # ======================================================================
  # JOB 5: Notificar Discord
  # ======================================================================
  notify:
    name: Notificar Discord
    needs: [validate, release]
    if: github.event.inputs.create_release == 'true' && always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Enviar notificacao
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          RELEASE_URL="https://github.com/shigake/Zion/releases/tag/v${VERSION}"
          DOWNLOAD_URL="https://github.com/shigake/Zion/releases/download/v${VERSION}/Zion-v${VERSION}-windows.zip"
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"Zion v${VERSION} - Nova release!\",
                  \"url\": \"${RELEASE_URL}\",
                  \"color\": 5814783,
                  \"fields\": [
                    {\"name\": \"Download\", \"value\": \"[Windows](${DOWNLOAD_URL})\", \"inline\": true},
                    {\"name\": \"Versao\", \"value\": \"v${VERSION}\", \"inline\": true}
                  ],
                  \"footer\": {\"text\": \"Zion - Survivors Roguelite Co-op\"},
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
            echo "Notificacao enviada."
          else
            echo "DISCORD_WEBHOOK_URL nao configurado."
          fi
